name: Validate CasC Bundle

on:
  push:
    branches: [main]
    paths:
      - "casc/**"

# Version bumping is NOT done here. The SCM Retriever sidecar detects the git
# commit hash change and writes updated bundles to $JENKINS_HOME/jcasc-bundles-store/.
# cloudbees-casc-server then auto-increments its own internal version counter,
# which controllers poll against. The bundle.yaml version field is a human-readable
# label only — bump it manually when you want to mark a significant change.
jobs:
  validate:
    name: Validate YAML syntax
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, sys, pathlib
          errors = 0
          for f in pathlib.Path('casc').rglob('*.yaml'):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  print(f'SYNTAX ERROR in {f}: {e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print('All YAML files parse cleanly.')
          "
