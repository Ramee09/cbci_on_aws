removeStrategy:
  rbac: SYNC
  items: SYNC

items:
  # ── Pipelines folder ──────────────────────────────────────────────────────
  - kind: folder
    name: "pipelines"
    displayName: "Pipelines"
    description: "Application pipelines — jobs are seeded from Git (jobs/devflow/)"
    items:
      # Hello-world smoke test — verifies agent provisioning end-to-end
      - kind: pipeline
        name: "hello-world"
        displayName: "Hello World"
        description: "Smoke test: confirms pod agent spins up on EKS"
        definition:
          cpsFlowDefinition:
            script: |
              @Library('cbci-shared') _
              pipeline {
                agent { label 'default-agent' }
                options { timestamps(); timeout(time: 10, unit: 'MINUTES') }
                stages {
                  stage('Verify') {
                    steps {
                      echo "Controller: ${env.JENKINS_URL}"
                      echo "Node: ${env.NODE_NAME}"
                      sh 'uname -a && java -version'
                    }
                  }
                }
                post {
                  always { notify() }
                }
              }
            sandbox: true

      # CI pipeline template — extend for real application pipelines
      - kind: pipeline
        name: "ci-template"
        displayName: "CI Template"
        description: "Reference pipeline using shared library steps"
        definition:
          cpsFlowDefinition:
            script: |
              @Library('cbci-shared') _
              pipeline {
                agent { label 'default-agent' }
                options { timestamps(); timeout(time: 30, unit: 'MINUTES') }
                stages {
                  stage('Checkout') {
                    steps { checkout scm }
                  }
                  stage('Build') {
                    steps {
                      echo "Build step — replace with your actual build commands"
                    }
                  }
                  stage('Test') {
                    steps {
                      echo "Test step — add your test commands here"
                    }
                  }
                }
                post {
                  always { notify() }
                }
              }
            sandbox: true

  # ── Admin folder ──────────────────────────────────────────────────────────
  - kind: folder
    name: "admin"
    displayName: "Admin"
    description: "Platform maintenance jobs"
    items:
      - kind: pipeline
        name: "casc-reload"
        displayName: "Reload CasC Bundle"
        description: "Manually triggers a CasC bundle reload on this controller"
        definition:
          cpsFlowDefinition:
            script: |
              pipeline {
                agent none
                stages {
                  stage('Reload') {
                    steps {
                      configFileProvider([]) {
                        echo "Triggering CasC reload..."
                      }
                    }
                  }
                }
              }
            sandbox: true
