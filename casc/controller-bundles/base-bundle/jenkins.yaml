jenkins:
  numExecutors: 0
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false


unclassified:
  bundleUpdateTiming:
    automaticReload: true
    reloadAlwaysOnRestart: true
    automaticRestart: true
    skipNewVersions: false
    rejectWarnings: false

  # pipelinePolicies config intentionally omitted here.
  # cloudbees-pipeline-policies must be installed (via plugins.yaml) before JCasC
  # can reference it — otherwise Jenkins throws ConfigurationAsCodeBootFailure on boot.
  # Re-add this block after controllers are stable and the plugin is installed.

