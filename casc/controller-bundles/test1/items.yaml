removeStrategy:
  rbac: SYNC
  items: SYNC

items:
  - kind: folder
    name: "pipelines"
    displayName: "Pipelines"
    description: "Test pipelines — mirrors devflow structure for QA validation"
    items:
      - kind: pipeline
        name: "hello-world"
        displayName: "Hello World"
        description: "Smoke test: confirms pod agent spins up on EKS"
        definition:
          cpsFlowDefinition:
            script: |
              @Library('cbci-shared') _
              pipeline {
                agent { label 'default-agent' }
                options { timestamps(); timeout(time: 10, unit: 'MINUTES') }
                stages {
                  stage('Verify') {
                    steps {
                      echo "Controller: ${env.JENKINS_URL}"
                      echo "Node: ${env.NODE_NAME}"
                      sh 'uname -a && java -version'
                    }
                  }
                }
                post {
                  always { notify() }
                }
              }
            sandbox: true

      - kind: pipeline
        name: "integration-test"
        displayName: "Integration Tests"
        description: "End-to-end test suite — add your integration test commands"
        definition:
          cpsFlowDefinition:
            script: |
              @Library('cbci-shared') _
              pipeline {
                agent { label 'default-agent' }
                options { timestamps(); timeout(time: 60, unit: 'MINUTES') }
                stages {
                  stage('Setup') {
                    steps { echo "Prepare test environment" }
                  }
                  stage('Run Tests') {
                    steps { echo "Run integration tests" }
                  }
                }
                post {
                  always { notify() }
                }
              }
            sandbox: true

  - kind: folder
    name: "admin"
    displayName: "Admin"
    description: "Platform maintenance jobs"
    items:
      - kind: pipeline
        name: "casc-reload"
        displayName: "Reload CasC Bundle"
        description: "Manually triggers a CasC bundle reload on this controller"
        definition:
          cpsFlowDefinition:
            script: |
              pipeline {
                agent none
                stages {
                  stage('Reload') {
                    steps { echo "CasC bundle reload triggered" }
                  }
                }
              }
            sandbox: true
