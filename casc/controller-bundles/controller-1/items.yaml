removeStrategy:
  rbac: SYNC
  items: SYNC

items:
  - kind: folder
    name: "platform"
    displayName: "Platform"
    description: "Platform engineering pipelines"
    items:
      - kind: pipeline
        name: "hello-world"
        displayName: "Hello World"
        description: "Smoke test — confirms pod agent starts on EKS agents NodePool"
        definition:
          cpsFlowDefinition:
            script: |
              pipeline {
                agent {
                  kubernetes {
                    yaml """
              apiVersion: v1
              kind: Pod
              spec:
                tolerations:
                - key: workload
                  operator: Equal
                  value: agents
                  effect: NoSchedule
                nodeSelector:
                  role: agent
                containers:
                - name: jnlp
                  image: jenkins/inbound-agent:3273.v4cfe589b_fd83-1
                  resources:
                    requests:
                      cpu: 500m
                      memory: 512Mi
                    limits:
                      cpu: "1"
                      memory: 1Gi
              """
                  }
                }
                options { timestamps() }
                stages {
                  stage('Verify') {
                    steps {
                      echo "Controller: ${env.JENKINS_URL}"
                      echo "Node:       ${env.NODE_NAME}"
                      sh 'uname -a && java -version'
                    }
                  }
                }
              }
            sandbox: true

  - kind: folder
    name: "admin"
    displayName: "Admin"
    description: "Platform maintenance jobs"
    items:
      - kind: pipeline
        name: "casc-status"
        displayName: "CasC Bundle Status"
        description: "Prints the active CasC bundle version on this controller"
        definition:
          cpsFlowDefinition:
            script: |
              pipeline {
                agent none
                stages {
                  stage('Status') {
                    steps {
                      echo "Controller URL: ${env.JENKINS_URL}"
                      echo "To inspect bundle: ${env.JENKINS_URL}core-casc-export"
                    }
                  }
                }
              }
            sandbox: true
