plugins:
  # saml and ldap: in the envelope but explicit to prevent accidental removal.
  - id: "saml"
  - id: "ldap"
  - id: "cloudbees-sso-relay-saml"
  # Required for items.yaml to create managedController/folder items and for
  # the cascAutoControllerProvisioning + bundleUpdateTiming JCasC configurators.
  # These are shipped in the CBCI WAR (WEB-INF/plugins) but must be explicitly
  # declared to be installed; without them OC throws UnknownAttributesException
  # on boot for both cascAutoControllerProvisioning and bundleUpdateTiming.
  # See: https://docs.cloudbees.com/docs/cloudbees-ci/latest/casc-oc/items
  - id: "cloudbees-casc-items-server"
  - id: "cloudbees-casc-items-api"
  - id: "cloudbees-casc-items-commons"
  - id: "cloudbees-casc-client"

