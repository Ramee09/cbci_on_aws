plugins:
  # Only list plugins NOT already in the CBCI envelope.
  # CBCI 2.426.2.2 ships all OC-required plugins as part of the bundle —
  # re-declaring them generates "Skipping — Only plugins in the envelope" warnings.
  # saml and ldap are in the envelope but explicitly declared to ensure they stay installed.
  - id: "saml"
  - id: "ldap"

