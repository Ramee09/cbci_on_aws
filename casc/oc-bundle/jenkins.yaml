          /><SingleSignOnService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST" Location="https://login.microsoftonline.com/504de928-8905-4671-a42f-3583b128e4ae/saml2"
          /></IDPSSODescriptor></EntityDescriptor>
      logoutUrl: https://login.microsoftonline.com/504de928-8905-4671-a42f-3583b128e4ae/saml2
      maximumAuthenticationLifetime: 86400
      usernameAttributeName: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress
  systemMessage: CloudBees CI Operations Center — managed via CasC

  # Note: jenkins.users is NOT supported in CBCI 2.555.x JCasC.
  # API token injection is done by scripts/setup-api-token.sh after OC starts.
  # globalLibraries belongs on managed controllers, not OC (OC has no pipeline execution).
  globalNodeProperties: []

unclassified:
  cascAutoControllerProvisioning:
    provisionControllerOnCreation: true   # auto-provisions pod when OC detects new managedController in CasC
    fireAndForget: true
    initialDelay: 15                      # wait 15s for license to confirm before provisioning
    timeout: 600
  bundleUpdateTiming:
    automaticReload: true    # hot-reload for JCasC/items changes (no restart needed)
    automaticRestart: true   # safe-restart when plugin set changes
    reloadAlwaysOnRestart: true
    skipNewVersions: false
    rejectWarnings: false
  bundleStorageService:
    activated: true
    pollingPeriod: 120
    bundles:
      - name: "controller-bundles"
        retriever:
          localFolderRetriever:
            localFolder: "/var/casc-bundles-git/repo/casc/controller-bundles"
  location:
    adminAddress: ''
    url: https://cjoc.myhomettbros.com/cjoc/
