removeStrategy:
  rbac: SYNC
  items: NONE

items:
  - kind: managedMaster
    name: devflow
    displayName: DevFlow
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        javaOptions: >-
          -Dcore.casc.config.bundle=/var/jenkins_home/casc-bundle
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Dhazelcast.kubernetes.pod-label-name=com.cloudbees.master.app
          -Dhazelcast.kubernetes.pod-label-value=devflow
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        replication:
          replicas: 1

  - kind: managedMaster
    name: test1
    displayName: Test1
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        javaOptions: >-
          -Dcore.casc.config.bundle=/var/jenkins_home/casc-bundle
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Dhazelcast.kubernetes.pod-label-name=com.cloudbees.master.app
          -Dhazelcast.kubernetes.pod-label-value=test1
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        replication:
          replicas: 2
