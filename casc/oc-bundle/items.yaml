removeStrategy:
  rbac: SYNC
  items: SYNC

items:
  - kind: folder
    name: platform
    displayName: "Platform"
    description: "Platform team folder"

  - kind: managedController
    name: citest-1
    displayName: "CITEST-1"
    approved: true
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: citest-1
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        image: "CloudBees CI - Managed Controller - 2.555.1.36485"
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=ci-controllers
          -Djenkins.install.runSetupWizard=false
          -Dcom.cloudbees.jenkins.plugins.kube.NamespaceFilter.defaultNamespace=ci-agents-citest-1
        replication:
          config:
            replicas: 2
    properties:
      - configurationAsCode:
          bundle: "controller-bundles/citest-1"

  - kind: managedController
    name: citest2
    displayName: "CITEST2"
    approved: true
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: citest2
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        image: "CloudBees CI - Managed Controller - 2.555.1.36485"
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=ci-controllers
          -Djenkins.install.runSetupWizard=false
          -Dcom.cloudbees.jenkins.plugins.kube.NamespaceFilter.defaultNamespace=ci-agents-citest2
        replication:
          config:
            replicas: 2
    properties:
      - configurationAsCode:
          bundle: "controller-bundles/citest2"
