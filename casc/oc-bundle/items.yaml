removeStrategy:
  rbac: SYNC
  items: SYNC

items:
  - kind: folder
    name: platform
    displayName: "Platform"
    description: "Platform team folder"

  - kind: managedController
    name: controller-1
    displayName: "Controller-1"
    approved: true
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: controller-1
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        image: "CloudBees CI - Managed Controller - 2.555.1.36485"
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=ci-controllers
          -Djenkins.install.runSetupWizard=false
          -Dcom.cloudbees.jenkins.plugins.kube.NamespaceFilter.defaultNamespace=ci-agents-controller-1
        replication:
          config:
            replicas: 2
        yaml: |
          spec:
            template:
              spec:
                affinity:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchLabels:
                              com.cloudbees.cje.tenant: controller-1
                          topologyKey: kubernetes.io/hostname
    properties:
      - configurationAsCode:
          bundle: "controller-bundles/controller-1"

  - kind: managedController
    name: controller-2
    displayName: "Controller-2"
    approved: true
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: controller-2
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        image: "CloudBees CI - Managed Controller - 2.555.1.36485"
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=ci-controllers
          -Djenkins.install.runSetupWizard=false
          -Dcom.cloudbees.jenkins.plugins.kube.NamespaceFilter.defaultNamespace=ci-agents-controller-2
        replication:
          config:
            replicas: 2
        yaml: |
          spec:
            template:
              spec:
                affinity:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchLabels:
                              com.cloudbees.cje.tenant: controller-2
                          topologyKey: kubernetes.io/hostname
    properties:
      - configurationAsCode:
          bundle: "controller-bundles/controller-2"
