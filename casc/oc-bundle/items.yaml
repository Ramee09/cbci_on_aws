removeStrategy:
  rbac: SYNC
  items: NONE

items:
  - kind: managedController
    name: devflow
    displayName: DevFlow
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: devflow
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        javaOptions: >-
          -Dcore.casc.config.bundle=/var/jenkins_home/casc-bundle
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Dhazelcast.kubernetes.pod-label-name=com.cloudbees.master.app
          -Dhazelcast.kubernetes.pod-label-value=devflow
        replication:
          config:
            replicas: 1

  - kind: managedController
    name: test1
    displayName: Test1
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: test1
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        javaOptions: >-
          -Dcore.casc.config.bundle=/var/jenkins_home/casc-bundle
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Dhazelcast.kubernetes.pod-label-name=com.cloudbees.master.app
          -Dhazelcast.kubernetes.pod-label-value=test1
        replication:
          config:
            replicas: 2
