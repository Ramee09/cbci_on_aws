# NOTE: This file is NOT referenced in bundle.yaml.
#
# Known issue: including items.yaml in the OC CasC bundle causes
# CasCInvalidKindException on OC pod restart (CBCI 2.555.x — managedMaster
# kind not registered at CasC load time). Controllers persist on EFS and
# reconnect to OC on startup without items.yaml being applied.
#
# This file serves two purposes:
#   1. Source of truth for how controllers should be configured on a fresh build.
#   2. Applied ONCE via scripts/bootstrap.sh (after OC is fully up) to provision
#      controllers when building from scratch.
#
# Networking notes:
#   The OC injects MASTER_ENDPOINT and com.cloudbees.networking.* JVM flags into
#   each controller Deployment at provisioning time, derived from the OC's own
#   networking config (values-oc.yaml: protocol=https, hostname=cjoc.myhomettbros.com,
#   useSubdomain=false). Do NOT put networking flags in javaOptions here — the OC
#   sets them automatically. Only put CBCI-specific flags that the OC does not inject.
#
#   If controllers were provisioned with wrong networking settings (e.g., pre-HTTPS
#   or after a DR restore from a pre-HTTPS backup), run:
#     bash scripts/fix-controller-networking.sh
#   This patches existing Deployments and is idempotent.
removeStrategy:
  rbac: SYNC
  items: NONE
items:
  - kind: managedMaster
    name: "devflow"
    displayName: "DevFlow"
    properties:
      - class: com.cloudbees.opscenter.server.properties.SlaveAgentPortProperty
      - class: com.cloudbees.opscenter.server.properties.ConnectedMasterLicenseServerProperty
      - class: com.cloudbees.masterprovisioning.kubernetes.KubernetesMasterProvisioning
        disk: 20
        memory: 2048
        cpus: 1.0
        fsGroup: "1000"
        storageClassName: "efs-ap"
        nodeSelector: "role=controller"
        javaOptions: >-
          -Dcore.casc.config.bundle=/var/jenkins_home/casc-bundle
        replication:
          replicas: 2
          maxReplicas: 4
          targetCPUUtilizationPercentage: 70

  - kind: managedMaster
    name: "test1"
    displayName: "Test1"
    properties:
      - class: com.cloudbees.opscenter.server.properties.SlaveAgentPortProperty
      - class: com.cloudbees.opscenter.server.properties.ConnectedMasterLicenseServerProperty
      - class: com.cloudbees.masterprovisioning.kubernetes.KubernetesMasterProvisioning
        disk: 20
        memory: 2048
        cpus: 1.0
        fsGroup: "1000"
        storageClassName: "efs-ap"
        nodeSelector: "role=controller"
        javaOptions: >-
          -Dcore.casc.config.bundle=/var/jenkins_home/casc-bundle
        replication:
          replicas: 2
          maxReplicas: 4
          targetCPUUtilizationPercentage: 70
