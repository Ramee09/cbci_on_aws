removeStrategy:
  rbac: SYNC
  items: NONE

items:
  # ── DevFlow controller ────────────────────────────────────────────────────
  - kind: managedMaster
    name: "devflow"
    displayName: "DevFlow"
    properties:
      - class: com.cloudbees.opscenter.server.properties.ConnectedMasterLicenseServerProperty
      - class: com.cloudbees.masterprovisioning.kubernetes.KubernetesMasterProvisioning
        disk: 20
        memory: 3072
        cpus: 1.0
        numExecutors: 0
        storageClassName: "efs-ap"
        nodeSelector: "role=controller"
        replication:
          replicas: 2
          maxReplicas: 4
          targetCPUUtilizationPercentage: 70
      - configurationAsCode:
          bundle: "devflow"

  # ── Test1 controller ──────────────────────────────────────────────────────
  - kind: managedMaster
    name: "test1"
    displayName: "Test1"
    properties:
      - class: com.cloudbees.opscenter.server.properties.ConnectedMasterLicenseServerProperty
      - class: com.cloudbees.masterprovisioning.kubernetes.KubernetesMasterProvisioning
        disk: 20
        memory: 3072
        cpus: 1.0
        numExecutors: 0
        storageClassName: "efs-ap"
        nodeSelector: "role=controller"
        replication:
          replicas: 2
          maxReplicas: 4
          targetCPUUtilizationPercentage: 70
      - configurationAsCode:
          bundle: "test1"
