removeStrategy:
  rbac: SYNC
  items: NONE

items:
  # ── DevFlow controller ────────────────────────────────────────────────────
  - kind: managedMaster
    name: "devflow"
    displayName: "DevFlow"
    properties:
      - class: com.cloudbees.opscenter.server.properties.ConnectedMasterLicenseServerProperty
      - class: com.cloudbees.masterprovisioning.kubernetes.KubernetesMasterProvisioning
        disk: 20
        memory: 3072
        cpus: 1.0
        numExecutors: 0
        storageClassName: "efs-ap"
        nodeSelector: "role=controller"
        # Hazelcast requires pods to discover each other via the K8s API.
        # pod-label-value must match the label CBCI OC stamps on controller pods.
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Dhazelcast.kubernetes.pod-label-name=com.cloudbees.master.app
          -Dhazelcast.kubernetes.pod-label-value=devflow
        replication:
          replicas: 2
      - configurationAsCode:
          bundle: "devflow"

  # ── Test1 controller ──────────────────────────────────────────────────────
  - kind: managedMaster
    name: "test1"
    displayName: "Test1"
    properties:
      - class: com.cloudbees.opscenter.server.properties.ConnectedMasterLicenseServerProperty
      - class: com.cloudbees.masterprovisioning.kubernetes.KubernetesMasterProvisioning
        disk: 20
        memory: 3072
        cpus: 1.0
        numExecutors: 0
        storageClassName: "efs-ap"
        nodeSelector: "role=controller"
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Dhazelcast.kubernetes.pod-label-name=com.cloudbees.master.app
          -Dhazelcast.kubernetes.pod-label-value=test1
        replication:
          replicas: 2
      - configurationAsCode:
          bundle: "test1"
