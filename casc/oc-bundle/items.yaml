removeStrategy:
  rbac: SYNC
  items: SYNC

items:
  - kind: managedController
    name: controller1
    displayName: Controller1
    approved: true
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: controller1
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Djenkins.install.runSetupWizard=false
        replication:
          config:
            replicas: 2
    properties:
      - configurationAsCode:
          bundle: "controller-bundles/controller1"

  - kind: managedController
    name: test1
    displayName: Test1
    approved: true
    configuration:
      kubernetes:
        disk: 20
        memory: 2048
        cpus: 1.0
        domain: test1
        allowExternalAgents: false
        nodeSelectors: "role=controller"
        storageClassName: efs-ap
        javaOptions: >-
          -Dcom.cloudbees.ha=true
          -Dhazelcast.kubernetes.namespace=cloudbees
          -Djenkins.install.runSetupWizard=false
        replication:
          config:
            replicas: 2
    properties:
      - configurationAsCode:
          bundle: "controller-bundles/test1"
