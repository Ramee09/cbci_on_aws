id: "oc-bundle"
version: "31"
apiVersion: 2
description: "Operations Center CasC bundle — fetched from GitHub via SCM Retriever"
plugins:
  - "plugins.yaml"
jcasc:
  - "jenkins.yaml"
items:
  - "items.yaml"
# IMPORTANT: increment 'version' whenever you change any bundle file.
# The SCM Retriever detects new git commits and downloads the new bundle;
# OC only applies it if the version field is higher than what is currently loaded.
# The casc-deploy GitHub Actions workflow auto-stamps this value on every push.
