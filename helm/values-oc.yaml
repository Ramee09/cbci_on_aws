OperationsCenter:
  Platform: standard

  # Disabled: we mount the bundle manually via initContainer + emptyDir
  # to avoid the Kubernetes ConfigMap symlink structure causing validation errors.
  CasC:
    Enabled: false

  # Point CBCI at the emptyDir where initContainer copied the real files
  # Set networking to HTTPS so CBCI constructs correct ACS/root URLs for SAML
  JavaOpts: "-Dcore.casc.config.bundle=/var/jenkins_casc-real -Dcom.cloudbees.networking.protocol=https -Dcom.cloudbees.networking.hostname=cjoc.myhomettbros.com -Dcom.cloudbees.networking.useSubdomain=false"

  ContainerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-secret
          key: password

  # Copy bundle files from ConfigMap (symlink structure) to emptyDir (real files),
  # then delete the CBCI EFS bundle cache so OC always reads the ConfigMap fresh.
  #
  # Why delete the cache: CBCI caches the active bundle to EFS at
  #   /var/jenkins_home/core-casc-bundle/
  # and reads from that cache on every restart — ignoring the configured bundle
  # path (/var/jenkins_casc-real/). Deleting the cache before OC starts forces
  # it to read the ConfigMap content every time. This eliminates the crash-loop
  # scenario where a bad cached bundle survives ConfigMap fixes.
  ExtraInitContainers:
    - name: casc-bundle-copy
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          cp -L /var/jenkins_casc-src/* /var/jenkins_casc-real/
          rm -rf /var/jenkins_home/core-casc-bundle/
      volumeMounts:
        - name: casc-bundle-src
          mountPath: /var/jenkins_casc-src
        - name: casc-bundle-real
          mountPath: /var/jenkins_casc-real
        - name: jenkins-home
          mountPath: /var/jenkins_home

  ExtraVolumes:
    - name: casc-bundle-src
      configMap:
        name: oc-casc-bundle
    - name: casc-bundle-real
      emptyDir: {}

  ExtraVolumeMounts:
    - name: casc-bundle-real
      mountPath: /var/jenkins_casc-real

  # Schedule OC on the Karpenter controllers NodePool (on-demand, t3.large/xlarge)
  NodeSelector:
    role: controller

  Resources:
    Requests:
      Cpu: "1"
      Memory: 2G
    Limits:
      Cpu: "2"
      Memory: 4G

  ServiceType: ClusterIP

  HostName: null

  # Controller provisioning via Groovy init script.
  # configure-jenkins.groovy.d/ runs after all plugins are loaded, which is
  # why this works where items.yaml bundle loading fails (managedMaster kind is
  # rejected by cloudbees-casc-items-api before plugins finish initialising).
  # Idempotent: each controller is only created when it does not already exist.
  ExtraGroovyConfiguration:
    init-controllers.groovy: |
      import jenkins.model.Jenkins
      import com.cloudbees.masterprovisioning.kubernetes.KubernetesMasterProvisioning
      import com.cloudbees.opscenter.server.model.ManagedMaster

      def oc = Jenkins.getInstance()

      [
        [name: "devflow", displayName: "DevFlow"],
        [name: "test1",   displayName: "Test1"],
      ].each { ctrl ->
        if (oc.getItem(ctrl.name) != null) {
          println("[init-controllers] ${ctrl.name}: already exists — skipping")
          return
        }

        println("[init-controllers] Creating managed controller: ${ctrl.name}")

        def prov = new KubernetesMasterProvisioning()
        prov.disk             = 20
        prov.memory           = 3072
        prov.cpus             = 1.0d
        prov.numExecutors     = 0
        prov.storageClassName = "efs-ap"
        prov.nodeSelector     = "role=controller"
        prov.javaOptions      = "-Dcore.casc.config.bundle=/var/jenkins_home/casc-bundle"

        def mm = new ManagedMaster(oc, ctrl.name)
        mm.setConfiguration(prov)
        oc.add(mm, ctrl.name)
        mm.save()
        oc.save()

        println("[init-controllers] ${ctrl.name}: created, OC will provision automatically")
      }

  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      alb.ingress.kubernetes.io/healthcheck-path: /cjoc/login
      alb.ingress.kubernetes.io/success-codes: "200,302"
      # Sticky sessions required: OC SSO login state is stored in HTTP session
      # (in-memory per pod). Without stickiness, ALB routes the /finishLogin
      # callback to a different pod than the one that generated the state → 403.
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

# Annotations applied to every managed controller ingress that CBCI auto-creates.
# Mirrors the OC ingress annotations — controllers are in the same ALB group
# and have the same sticky-session and TLS requirements.
Master:
  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      alb.ingress.kubernetes.io/success-codes: "200,302"
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

Agents:
  SeparateNamespace:
    Enabled: false

# EFS-backed home directory for OC
Persistence:
  StorageClass: efs-ap
  AccessMode: ReadWriteOnce
  Size: 20Gi
