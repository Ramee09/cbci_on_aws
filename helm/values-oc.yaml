OperationsCenter:
  Platform: standard
  Protocol: https

  # SCM Retriever fetches the OC bundle from GitHub on startup (init container) and
  # polls every 1 minute. ocBundleAutomaticVersion replaces the version field in
  # bundle.yaml with the SCM commit hash — no manual version bumping needed.
  # Any push to casc/oc-bundle/ is detected automatically on the next poll cycle.
  # Webhook: https://cjoc.myhomettbros.com/cjoc/casc-retriever/retriever-github-webhook/
  # Configure that URL in GitHub repo Settings → Webhooks for instant apply on push.
  CasC:
    Enabled: true
    Retriever:
      Enabled: true
      scmRepo: "https://github.com/Ramee09/cbci_on_aws.git"
      scmBranch: "main"
      scmBundlePath: "casc/oc-bundle"
      scmPollingInterval: "PT1M"
      githubWebhooksEnabled: "true"
      ocBundleAutomaticVersion: "true"
      secrets:
        # HMAC secret for GitHub webhook signature validation (X-Hub-Signature-256).
        # K8s secret 'github-webhook-secret' is created by bootstrap.sh from
        # AWS Secrets Manager cbci-lab/github-webhook-secret.
        githubWebhookSecret: github-webhook-secret

  # Protocol: https above makes the Helm template generate all com.cloudbees.networking.*
  # JVM properties correctly (protocol, hostname, port=443, useSubdomain).
  # No JavaOpts override needed — the chart handles it.

  ContainerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-secret
          key: password

  # git-sync init container: clones the repo once before OC starts so
  # bundleStorageService can read controller bundles on the very first startup.
  ExtraInitContainers:
    - name: cleanup-stale-config
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          # Disable deprecated Blue Ocean plugins and non-CAP ace-editor
          mkdir -p /jh/plugins
          touch /jh/plugins/ace-editor.jpi.disabled
          touch /jh/plugins/blueocean-commons.jpi.disabled
          touch /jh/plugins/cloudbees-blueocean-default-theme.jpi.disabled
          # Remove stale SecurityEnforcer XML: crumbIssuer field type changed in
          # CBCI 2.555, XStream throws CannotResolveClassException on the old value.
          SE="/jh/com.cloudbees.opscenter.server.security.SecurityEnforcer_-GlobalConfigurationImpl.xml"
          if [ -f "$SE" ]; then sed -i '/<crumbIssuer>/d' "$SE"; fi
          # Remove stale DAVStore XML: contains an embedded <j class="hudson.model.Hudson">
          # blob from an ancient plugin version; the field was removed, causing MissingFieldException.
          rm -f "/jh/com.infradna.hudson.plugins.backup.store.DAVStore.xml"
      volumeMounts:
        - name: jenkins-home
          mountPath: /jh
    - name: casc-bundles-init
      image: registry.k8s.io/git-sync/git-sync:v4.4.0
      args:
        - --repo=https://github.com/Ramee09/cbci_on_aws.git
        - --ref=main
        - --depth=1
        - --root=/git-data
        - --link=repo
        - --one-time
      volumeMounts:
        - name: casc-bundles-git
          mountPath: /git-data

  # git-sync sidecar: keeps the repo in sync with GitHub every 60 seconds.
  # When a new commit lands, the OC's next bundleStorageService poll (120s)
  # detects the checksum change and hot-reloads the affected controller bundles.
  ExtraContainers:
    - name: casc-bundles-sync
      image: registry.k8s.io/git-sync/git-sync:v4.4.0
      args:
        - --repo=https://github.com/Ramee09/cbci_on_aws.git
        - --ref=main
        - --depth=1
        - --root=/git-data
        - --link=repo
        - --period=60s
      volumeMounts:
        - name: casc-bundles-git
          mountPath: /git-data

  ExtraVolumes:
    - name: casc-bundles-git
      emptyDir: {}

  # Mount the git-sync volume into the OC container so localFolderRetriever can read it.
  ExtraVolumeMounts:
    - name: casc-bundles-git
      mountPath: /var/casc-bundles-git
      readOnly: true


  # Schedule OC on the Karpenter controllers NodePool (on-demand, t3.large/xlarge)
  NodeSelector:
    role: controller

  Resources:
    Requests:
      Cpu: "1"
      Memory: 2G
    Limits:
      Cpu: "2"
      Memory: 4G

  ServiceType: ClusterIP

  HostName: cjoc.myhomettbros.com

  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      alb.ingress.kubernetes.io/healthcheck-path: /cjoc/login
      alb.ingress.kubernetes.io/success-codes: "200,302"
      # Sticky sessions required: OC SSO login state is stored in HTTP session
      # (in-memory per pod). Without stickiness, ALB routes the /finishLogin
      # callback to a different pod than the one that generated the state → 403.
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

# Annotations applied to every managed controller ingress that CBCI auto-creates.
# Mirrors the OC ingress annotations — controllers are in the same ALB group
# and have the same sticky-session and TLS requirements.
Master:
  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      # No healthcheck-path here — ALB default is / which Jenkins 302-redirects to the
      # controller's context root; success-codes includes 302 so targets stay healthy.
      alb.ingress.kubernetes.io/success-codes: "200,302"
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

SsoRelay:
  enabled: true
  ingress:
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /q/health/ready
      alb.ingress.kubernetes.io/success-codes: "200"
  controller:
    replicas: 2
    nodeSelector:
      role: controller
    # Trust X-Forwarded-Proto/Host from ALB so the relay computes its ACS URL
    # as https:// when generating SAML AuthnRequests.
    # proxy-address-forwarding=true is the primary switch; enable-forwarded-host
    # and allow-x-forwarded are belt-and-suspenders for Quarkus 3.x native.
    javaOpts: "-Dquarkus.http.proxy.proxy-address-forwarding=true -Dquarkus.http.proxy.enable-forwarded-host=true -Dquarkus.http.proxy.allow-x-forwarded=true"
    resources:
      requests:
        cpu: "100m"
        memory: 500Mi
      limits:
        memory: 500Mi

Agents:
  SeparateNamespace:
    Enabled: true
    Create: true

# EFS-backed home directory for OC
Persistence:
  StorageClass: efs-ap
  AccessMode: ReadWriteOnce
  Size: 20Gi
