OperationsCenter:
  Platform: standard

  # SCM Retriever fetches the bundle from GitHub on startup (init container) and
  # polls every 3 minutes (sidecar). When a new bundle version is detected, OC
  # reloads automatically via bundleUpdateTiming in jenkins.yaml.
  # Webhook: https://cjoc.myhomettbros.com/cjoc/casc-retriever/retriever-github-webhook/
  # Configure that URL in GitHub repo Settings → Webhooks for instant apply on push.
  CasC:
    Enabled: true
    Retriever:
      Enabled: true
      scmRepo: "https://github.com/Ramee09/cbci_on_aws.git"
      scmBranch: "main"
      scmBundlePath: "casc/oc-bundle"
      scmPollingInterval: "PT3M"
      githubWebhooksEnabled: true
      secrets:
        secretName: casc-retriever-secrets
        githubWebhookSecret: gh-webhook-secret

  # Networking opts required for SAML SSO to construct correct ACS/root URLs.
  # core.casc.config.bundle is NOT set — the SCM Retriever manages that path.
  JavaOpts: "-Dcom.cloudbees.networking.protocol=https -Dcom.cloudbees.networking.hostname=cjoc.myhomettbros.com -Dcom.cloudbees.networking.useSubdomain=false"

  ContainerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-secret
          key: password

  # Two init containers run after the SCM Retriever init container:
  #   1. clear-casc-cache  — deletes stale OC bundle cache from EFS so a bad
  #      bundle never survives a restart and causes a crash-loop.
  #   2. seed-controller-bundles — sparse-clones the repo and copies
  #      casc/controller-bundles/{devflow,test1}/ into OC's casc-server bundle
  #      storage ($JENKINS_HOME/casc-server-bundles/). casc-client on each
  #      controller then pulls the assigned bundle from OC via HTTPS — no
  #      ConfigMaps or initContainers on the controller pods at all.
  ExtraInitContainers:
    - name: clear-casc-cache
      image: busybox:1.36
      command: ["sh", "-c", "rm -rf /var/jenkins_home/core-casc-bundle/ && echo 'EFS bundle cache cleared'"]
      volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

    - name: seed-controller-bundles
      image: alpine/git:2.43.0
      command:
        - sh
        - -c
        - |
          set -e
          DEST="/var/jenkins_home/casc-server-bundles"
          mkdir -p "${DEST}"
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/Ramee09/cbci_on_aws.git /tmp/cbci-repo
          cd /tmp/cbci-repo
          git sparse-checkout set casc/controller-bundles
          for d in casc/controller-bundles/*/; do
            name=$(basename "${d}")
            mkdir -p "${DEST}/${name}"
            cp -r "${d}"* "${DEST}/${name}/"
            echo "Seeded ${name} bundle → ${DEST}/${name}/"
          done
      volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

  # Schedule OC on the Karpenter controllers NodePool (on-demand, t3.large/xlarge)
  NodeSelector:
    role: controller

  Resources:
    Requests:
      Cpu: "1"
      Memory: 2G
    Limits:
      Cpu: "2"
      Memory: 4G

  ServiceType: ClusterIP

  HostName: null

  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      alb.ingress.kubernetes.io/healthcheck-path: /cjoc/login
      alb.ingress.kubernetes.io/success-codes: "200,302"
      # Sticky sessions required: OC SSO login state is stored in HTTP session
      # (in-memory per pod). Without stickiness, ALB routes the /finishLogin
      # callback to a different pod than the one that generated the state → 403.
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

# Annotations applied to every managed controller ingress that CBCI auto-creates.
# Mirrors the OC ingress annotations — controllers are in the same ALB group
# and have the same sticky-session and TLS requirements.
Master:
  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      alb.ingress.kubernetes.io/success-codes: "200,302"
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

Agents:
  SeparateNamespace:
    Enabled: false

# EFS-backed home directory for OC
Persistence:
  StorageClass: efs-ap
  AccessMode: ReadWriteOnce
  Size: 20Gi
