OperationsCenter:
  Platform: standard

  # SCM Retriever fetches the bundle from GitHub on startup (init container) and
  # polls every 3 minutes (sidecar). When a new bundle version is detected, OC
  # reloads automatically via bundleUpdateTiming in jenkins.yaml.
  # Webhook: https://cjoc.myhomettbros.com/cjoc/casc-retriever/retriever-github-webhook/
  # Configure that URL in GitHub repo Settings → Webhooks for instant apply on push.
  CasC:
    Enabled: true
    Retriever:
      Enabled: true
      scmRepo: "https://github.com/Ramee09/cbci_on_aws.git"
      scmBranch: "main"
      scmBundlePath: "casc/oc-bundle"
      scmPollingInterval: "PT3M"
      githubWebhooksEnabled: false

  # Networking opts required for SAML SSO to construct correct ACS/root URLs.
  # core.casc.config.bundle is NOT set — the SCM Retriever manages that path.
  JavaOpts: "-Dcom.cloudbees.networking.protocol=https -Dcom.cloudbees.networking.hostname=cjoc.myhomettbros.com -Dcom.cloudbees.networking.useSubdomain=false"

  ContainerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-secret
          key: password


  # Schedule OC on the Karpenter controllers NodePool (on-demand, t3.large/xlarge)
  NodeSelector:
    role: controller

  Resources:
    Requests:
      Cpu: "1"
      Memory: 2G
    Limits:
      Cpu: "2"
      Memory: 4G

  ServiceType: ClusterIP

  HostName: null

  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      alb.ingress.kubernetes.io/healthcheck-path: /cjoc/login
      alb.ingress.kubernetes.io/success-codes: "200,302"
      # Sticky sessions required: OC SSO login state is stored in HTTP session
      # (in-memory per pod). Without stickiness, ALB routes the /finishLogin
      # callback to a different pod than the one that generated the state → 403.
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

# Annotations applied to every managed controller ingress that CBCI auto-creates.
# Mirrors the OC ingress annotations — controllers are in the same ALB group
# and have the same sticky-session and TLS requirements.
Master:
  Ingress:
    Class: alb
    Annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:835090871306:certificate/8d0bab7f-cd88-45de-911f-1574b1f3db60"
      alb.ingress.kubernetes.io/tags: "Project=cbci-lab,ManagedBy=helm"
      alb.ingress.kubernetes.io/group.name: cbci-oc
      alb.ingress.kubernetes.io/success-codes: "200,302"
      alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400,stickiness.type=lb_cookie"
    tls:
      Enable: false

Agents:
  SeparateNamespace:
    Enabled: false

# EFS-backed home directory for OC
Persistence:
  StorageClass: efs-ap
  AccessMode: ReadWriteOnce
  Size: 20Gi
