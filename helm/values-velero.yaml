## Velero v8.1.0 — Backup & Disaster Recovery
## Chart: vmware-tanzu/velero v8.1.0
## Namespace: velero (created by helm install --create-namespace)

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: cbci-velero-backups-835090871306
      config:
        region: us-east-1
  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: us-east-1

serviceAccount:
  server:
    annotations:
      # IAM role ARN injected after terraform/55-backup apply
      eks.amazonaws.com/role-arn: "arn:aws:iam::835090871306:role/cbci-velero"

credentials:
  useSecret: false  # use IRSA — no static creds

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.12.0
    volumeMounts:
      - mountPath: /target
        name: plugins

# Run on controller nodes (stable, always-on MNG)
nodeSelector:
  role: controller

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Backup Schedules ──────────────────────────────────────────
# Daily at 02:00 UTC — backs up all CBCI namespaces
# TTL 720h (30 days) matches AWS Backup retention
schedules:
  cbci-daily:
    disabled: false
    schedule: "0 2 * * *"
    useOwnerReferencesInBackup: false
    template:
      ttl: "720h"
      storageLocation: default
      includedNamespaces:
        - ci-controllers
        - ci-agents-controller-1
        - ci-agents-controller-2
      # Include cluster-scoped resources that belong to these namespaces
      includeClusterResources: true

  # Pre-maintenance manual trigger — kept for 48h only
  # Usage: velero backup create pre-maint-$(date +%Y%m%d) --from-schedule cbci-pre-maintenance
  cbci-pre-maintenance:
    disabled: true
    schedule: "0 0 1 1 *"  # placeholder (manual trigger only)
    template:
      ttl: "48h"
      storageLocation: default
      includedNamespaces:
        - ci-controllers
      includeClusterResources: true
