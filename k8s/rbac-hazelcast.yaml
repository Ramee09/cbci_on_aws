---
# Hazelcast K8s discovery calls the K8s API to list pods by label.
# The controller pod ServiceAccount needs get/list/watch on pods and endpoints.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hazelcast-pod-reader
  namespace: cloudbees
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]

---
# Bind to the default SA in cloudbees namespace (used by controller pods).
# If CBCI creates per-controller SAs, add additional RoleBindings with those names.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hazelcast-pod-reader
  namespace: cloudbees
subjects:
  - kind: ServiceAccount
    name: default
    namespace: cloudbees
roleRef:
  kind: Role
  name: hazelcast-pod-reader
  apiGroup: rbac.authorization.k8s.io
