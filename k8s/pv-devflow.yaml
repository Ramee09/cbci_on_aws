    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-ap
  csi:
    driver: efs.csi.aws.com
    volumeHandle: "fs-0b4f7798361a31568::fsap-0a6e126668550e329"
