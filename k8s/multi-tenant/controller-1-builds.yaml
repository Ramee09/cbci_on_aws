apiVersion: v1
kind: Namespace
metadata:
  name: controller-1-builds
  labels:
    cloudbees.com/role: agents
    cloudbees.com/controller: controller-1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-agents
  namespace: controller-1-builds
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-agents
  namespace: controller-1-builds
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controller-1-manages-builds
  namespace: controller-1-builds
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-agents
subjects:
- kind: ServiceAccount
  name: controller-1
  namespace: cloudbees
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-agents-builds
  namespace: controller-1-builds
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-agents
subjects:
- kind: ServiceAccount
  name: jenkins-agents
  namespace: controller-1-builds
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-quota
  namespace: controller-1-builds
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 64Gi
    limits.cpu: "16"
    limits.memory: 64Gi
    pods: "40"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: agent-limits
  namespace: controller-1-builds
spec:
  limits:
  - type: Container
    default:
      cpu: "1"
      memory: 2Gi
    defaultRequest:
      cpu: 500m
      memory: 512Mi
    max:
      cpu: "4"
      memory: 8Gi
    min:
      cpu: 100m
      memory: 128Mi
