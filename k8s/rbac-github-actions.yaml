# Kubernetes RBAC for GitHub Actions (Phase 14)
#
# The IAM role cbci-lab-github-actions is mapped into the cluster via aws-auth:
#   eksctl create iamidentitymapping \
#     --cluster cbci-lab --region us-east-1 --profile cbci-lab \
#     --arn arn:aws:iam::835090871306:role/cbci-lab-github-actions \
#     --username github-actions
#
# This Role grants that identity the minimum permissions needed to update
# the oc-casc-bundle ConfigMap via the casc-deploy GitHub Actions workflow.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: casc-bundle-updater
  namespace: cloudbees
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["oc-casc-bundle"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: casc-bundle-updater
  namespace: cloudbees
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: casc-bundle-updater
subjects:
  - kind: User
    name: github-actions
    apiGroup: rbac.authorization.k8s.io
