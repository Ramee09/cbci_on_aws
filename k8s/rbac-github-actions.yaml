# Kubernetes RBAC for GitHub Actions
#
# The IAM role cbci-lab-github-actions is mapped into the cluster via aws-auth:
#   eksctl create iamidentitymapping \
#     --cluster cbci-lab --region us-east-1 --profile cbci-lab \
#     --arn arn:aws:iam::835090871306:role/cbci-lab-github-actions \
#     --username github-actions
#
# Controller bundles are now seeded from GitHub via an OC initContainer —
# no ConfigMap updates needed from CI. This Role is kept minimal (read-only
# on pods) in case future workflows need cluster introspection.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: casc-bundle-updater
  namespace: cloudbees
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: casc-bundle-updater
  namespace: cloudbees
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: casc-bundle-updater
subjects:
  - kind: User
    name: github-actions
    apiGroup: rbac.authorization.k8s.io
