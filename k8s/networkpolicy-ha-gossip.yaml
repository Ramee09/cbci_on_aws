---
# Allow Hazelcast gossip (TCP 5701) between replicas of controller-1.
# CBCI stamps controller pods with label: com.cloudbees.cje.tenant=<controller-name>
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controller-1-ha-gossip
  namespace: ci-controllers
spec:
  podSelector:
    matchLabels:
      com.cloudbees.cje.tenant: controller-1
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              com.cloudbees.cje.tenant: controller-1
      ports:
        - port: 5701
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              com.cloudbees.cje.tenant: controller-1
      ports:
        - port: 5701
          protocol: TCP
    # Allow Hazelcast to call the K8s API for pod discovery
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP

---
# Same policy for controller-2.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controller-2-ha-gossip
  namespace: ci-controllers
spec:
  podSelector:
    matchLabels:
      com.cloudbees.cje.tenant: controller-2
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              com.cloudbees.cje.tenant: controller-2
      ports:
        - port: 5701
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              com.cloudbees.cje.tenant: controller-2
      ports:
        - port: 5701
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
