apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: controllers
spec:
  template:
    metadata:
      labels:
        role: controller
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.large", "t3.xlarge"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  limits:
    cpu: "32"
    memory: 64Gi
  disruption:
    # WhenEmpty prevents Karpenter from consolidating nodes that still host
    # live HA controller pods, which would break Hazelcast cluster quorum.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
