apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jenkins-admin-password
  namespace: cloudbees
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: jenkins-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: cbci-lab/jenkins-admin-password
        property: password
---
# CI automation API token — used by provision-controllers.sh and bootstrap jobs.
# token: plaintext token (used as Basic-auth password in API calls)
# hash:  SHA-256 of token (stored in Jenkins user config via CasC)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jenkins-api-token
  namespace: cloudbees
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: jenkins-api-token-secret
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: cbci-lab/jenkins-api-token
        property: token
    - secretKey: hash
      remoteRef:
        key: cbci-lab/jenkins-api-token
        property: hash
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-password
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: cbci-lab/grafana-admin-password
        property: password
    - secretKey: admin-user
      remoteRef:
        key: cbci-lab/grafana-admin-password
        property: username
